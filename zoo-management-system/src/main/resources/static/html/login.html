<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 森屿动物园管理系统 - 登录</title>
    <link rel="stylesheet" href="https://cdn.staticfile.org/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
<!-- 背景装饰层 -->
<div class="bg-decoration">
    <div class="bg-blur"></div>
    <div class="decor-element decor1"></div>
    <div class="decor-element decor2"></div>
    <div class="decor-element decor3"></div>
    <div class="decor-element decor4"></div>
    <div class="animal-icon bear"><i class="fas fa-bear"></i></div>
    <div class="animal-icon panda"><i class="fas fa-paw"></i></div>
    <div class="animal-icon bird"><i class="fas fa-dove"></i></div>
    <div class="animal-icon fox"><i class="fas fa-dog"></i></div>
</div>

<div class="login-container fade-in">
    <div class="cloud-shape-login">
        <div class="cloud-border"></div>
        <div class="login-content">
            <!-- 左侧Logo区域 -->
            <div class="login-logo">
                <div class="logo-circle">
                    <img src="../images/logo.png" alt="动物园logo">
                    <div class="logo-glow"></div>
                </div>
                <h1 class="title">
                    <span class="text-animation">🐼森屿动物园</span>
                </h1>
                <div class="subtitle">  管理系统</div>
                <div class="slogan">安全 · 便捷 · 贴心</div>
            </div>

            <!-- 右侧表单区域 -->
            <div class="form-wrapper">
                <form id="loginForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="username" class="label-animation">
                                <i class="fas fa-user"></i> 用户名
                            </label>
                            <div class="input-group">
                                <span class="input-icon"><i class="fas fa-user-circle"></i></span>
                                <input type="text" id="username" name="username" class="input" placeholder="请输入用户名" required>
                                <div class="input-glow"></div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="password" class="label-animation">
                                <i class="fas fa-lock"></i> 密码
                            </label>
                            <div class="input-group">
                                <span class="input-icon"><i class="fas fa-lock-alt"></i></span>
                                <input type="password" id="password" name="password" class="input" placeholder="请输入密码" required>
                                <div class="input-glow"></div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group role-group">
                        <label for="role" class="label-animation">
                            <i class="fas fa-user-tag"></i> 用户角色
                        </label>
                        <div class="input-group">
                            <span class="input-icon"><i class="fas fa-users"></i></span>
                            <select id="role" name="role" class="input" required>
                                <option value="">请选择角色</option>
                                <option value="admin">管理员（园长）</option>
                                <option value="keeper">饲养员</option>
                                <option value="visitor">游客</option>
                            </select>
                            <div class="input-glow"></div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-login">
                        <span>登录 🐾</span>
                        <div class="btn-wave"></div>
                    </button>

                    <!-- 测试账号信息 -->
                    <div class="test-info card-hover">
                        <div class="test-title">
                            <i class="fas fa-info-circle"></i> 测试账号
                        </div>
                        <div class="test-accounts">
                            <span>管理员：admin/123456</span>
                            <span>饲养员：keeper01/123456</span>
                            <span>游客：visitor01/123456</span>
                        </div>
                    </div>
                      <div class="additional-info">
                        <h3><i class="fas fa-info-circle"></i> 动物园介绍</h3>
                        <p><i class="fas fa-paw"></i> 森屿动物园 - 您的动物朋友家园</p>
                        <p><i class="fas fa-map-marker-alt"></i> 地址: 森屿市动物园街123号</p>
                        <p><i class="fas fa-clock"></i> 开放时间: 8:00-18:00 (全年开放)</p>
                        <p><i class="fas fa-palette"></i> 特色: 与动物亲密接触，科普教育</p>
                    </div>
                    <div class="system-status">
                        <span><i class="fas fa-circle" style="color: #28a745;"></i> 动物园开放中</span>
                        <span><i class="fas fa-heart"></i> 动物健康状态良好</span>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- 底部装饰 -->
<div class="bottom-decoration">
    <div class="grass left"></div>
    <div class="grass middle"></div>
    <div class="grass right"></div>
</div>

<script src="../js/common.js"></script>
<script src="../js/login.js"></script>
</body>
</html>
