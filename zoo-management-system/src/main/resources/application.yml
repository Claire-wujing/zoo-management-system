spring:
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/zoo_management?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root  # 你的MySQL用户名
    password: 123456  # 你的MySQL密码
    driver-class-name: com.mysql.cj.jdbc.Driver

# Spring Boot Web配置
server:
  port: 8080  # 端口号，浏览器访问用
  servlet:
    context-path: /  # 根路径

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml  # Mapper映射文件路径（可选）
  type-aliases-package: com.zoo.entity  # 实体类别名包
  configuration:
    map-underscore-to-camel-case: true  # 下划线转驼峰（数据库字段user_name -> 实体类userName）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 打印SQL日志（新手调试用）
  global-config:
    db-config:
      id-type: auto  # 主键自增